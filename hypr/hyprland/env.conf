# ############# Themes #############
env = QT_QPA_PLATFORMTHEME, qtengine
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = XCURSOR_THEME, $cursorTheme
env = XCURSOR_SIZE, $cursorSize

# ######## Toolkit backends ########
env = GDK_BACKEND, wayland,x11
env = QT_QPA_PLATFORM, wayland;xcb
env = SDL_VIDEODRIVER, wayland,x11,windows
env = CLUTTER_BACKEND, wayland

# ####### XDG specifications #######
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# ############# Others #############
env = _JAVA_AWT_WM_NONREPARENTING, 1

# ############# graphical fixes from lap #############
env = ELECTRON_OZONE_PLATFORM_HINT, wayland
#env = HYPRCURSOR_THEME,'Satori Komeiji (64x64)'
#env = HYPRCURSOR_SIZE,30
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
#env = QT_CURSOR_THEME,'Satori Komeiji (64x64)'
#env = QT_CURSOR_SIZE,16
env = NVD_BACKEND,direct
env = __NV_PRIME_RENDER_OFFLOAD,1
env = __VK_LAYER_NV_optimus,NVIDIA_only
env = GDK_SCALE,1.33